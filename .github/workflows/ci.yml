name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgres://placeholder@localhost/placeholder
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ADMIN_PASSWORD: ci-placeholder-admin
      IRON_SESSION_PASSWORD: ci-placeholder-iron-session-password-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run full check chain
        run: bun run check
